<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #1C2833;
  padding: 20pt 40pt;
}
.header h1 {
  color: #ffffff;
  font-size: 28pt;
  margin: 0;
  font-weight: bold;
}
.content {
  flex: 1;
  padding: 30pt 40pt;
}
.placeholder {
  background: #E8EAED;
  border: 2pt dashed #AAB7B8;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.placeholder p {
  color: #7F8C8D;
  font-size: 12pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>Risks & Mitigations</h1>
</div>
<div class="content">
  <div id="table" class="placeholder" style="width: 100%; height: 100%;">
    <p>Table: Risks and Mitigations</p>
  </div>
</div>
</body>
</html>
