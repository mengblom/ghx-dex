<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #1C2833;
  padding: 20pt 40pt;
}
.header h1 {
  color: #ffffff;
  font-size: 28pt;
  margin: 0;
  font-weight: bold;
}
.content {
  flex: 1;
  padding: 50pt 80pt 30pt 80pt;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.intro {
  color: #1C2833;
  font-size: 15pt;
  margin-bottom: 25pt;
  font-weight: bold;
}
.focus-list {
  background: #F8F9FA;
  padding: 25pt;
  border-left: 8pt solid #27AE60;
}
.focus-list h2 {
  color: #1C2833;
  font-size: 18pt;
  margin: 0 0 20pt 0;
  font-weight: bold;
}
.focus-list ol {
  color: #2E4053;
  font-size: 14pt;
  line-height: 1.8;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>Q3 - Q4 Technical Laser Focus</h1>
</div>
<div class="content">
  <p class="intro">Strict direction to teams for Q3 and Q4:</p>
  <div class="focus-list">
    <h2>75% Technical Capacity - Three Buckets Only:</h2>
    <ol>
      <li>Red Mythos (Vulnerabilities & EOL Technologies)</li>
      <li>Disaster Recovery</li>
      <li>Autonomous Teams / Breaking the Monolith</li>
    </ol>
  </div>
</div>
</body>
</html>
