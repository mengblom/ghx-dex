# Strategic Pillars Configuration
# 
# Pillars are your main focus areas — think of them as how you carve up your role thematically.
# These are NOT time-bound (like quarterly goals). They represent ongoing areas of responsibility
# that typically stay consistent for 6-12+ months, or until your role significantly changes.
#
# PILLAR (ongoing):           GOAL (time-bound):
# "Revenue Growth"      vs    "Hit 150% quota in Q1"
# "Product Strategy"    vs    "Launch mobile app"
# "Customer Retention"  vs    "Reduce churn to <2%"
#
# Want to change your pillars? Just chat with Claude: "I need to reconfigure my strategic pillars"
# — it'll help you update how your work ladders up to new focus areas.
#
# The Work MCP uses these to categorize tasks and check balance across your work.

pillars:
  - id: org_foundation
    name: "Organizational Foundation (People & Process)"
    description: "Building the right team, skills, and processes to enable autonomous delivery"
    keywords:
      - hiring
      - onboarding
      - upskilling
      - agile
      - process
      - team structure
      - training
      - SDLC
      - workflow

  - id: break_monolith
    name: "Breaking the Monolith → Autonomous Teams"
    description: "Architectural transformation to enable independent, cross-functional teams"
    keywords:
      - architecture
      - autonomous teams
      - domain boundaries
      - decoupling
      - microservices
      - strangler pattern
      - Conway's Law
      - deployment independence
      - technical architecture

  - id: ai_native
    name: "AI Native Software Development Process"
    description: "Integrating AI throughout the development workflow for competitive advantage"
    keywords:
      - AI
      - Claude
      - Copilot
      - MCP
      - AI-native
      - automation
      - developer tools
      - SDLC automation
      - LLM

  - id: critical_execution
    name: "Critical Technical Execution"
    description: "Delivering migrations, stability, security, and keeping the lights on"
    keywords:
      - migrations
      - MongoDB Atlas
      - AWS SDK
      - technical debt
      - stability
      - security
      - resilience
      - incident response
      - production

# Priority limits (how many active tasks per priority level)
priority_limits:
  P0: 3   # Critical/urgent - max 3 at a time
  P1: 5   # Important - max 5 at a time
  P2: 10  # Normal - suggested limit
